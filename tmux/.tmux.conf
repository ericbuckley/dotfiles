set -g prefix C-a
unbind C-b

set-option -g default-shell $SHELL

set -g status-position top
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g extended-keys-format csi-u
set -g extended-keys on
set -as terminal-features 'wezterm*:extkeys'

set -g mouse off

set-option -sa terminal-overrides ',xterm-256color:RGB'
set-option -sa terminal-overrides ',alacritty:RGB'
set-option -sa terminal-overrides ',wezterm:RGB'


# Open a tmux scratchpad
bind C-t run-shell '~/.tmux/popuptmux.sh'

# Double tap <C-a> to go to the beginning of the line
bind C-a send-prefix

# List of plugins
set -g @tpm_plugins '                     \
    tmux-plugins/tpm                      \
    tmux-plugins/tmux-sensible            \
    tmux-plugins/tmux-yank                \
    tmux-plugins/tmux-pain-control        \
    tmux-plugins/tmux-resurrect           \
    tmux-plugins/tmux-continuum           \
    2kabhishek/tmux2k                     \
    christoomey/vim-tmux-navigator        \
    christoomey/vim-tmux-navigator        \
    maxonvim/tmux-underkeys               \
'

set -g @continuum-restore 'on'
set -g @tmux2k-theme 'gruvbox'
set -g @tmux2k-left-plugins 'none'
set -g @tmux2k-right-plugins 'ram cpu-temp cpu'
set -g @tmux2k-time-format '%H:%M'

# underkeys: keep C-g + letter keybindings, disable its own status-right display
set -g @underkeys-status 'off'
set -g @underkeys-current-style 'fg=#98971a,bold'
set -g @underkeys-style 'fg=#a89984'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Set status-left to underkeys session list after tmux2k has cleared it
set -g status-left " #(~/.tmux/plugins/tmux-underkeys/scripts/underkeys status '#S' 'fg=#d79921,bold' 'fg=white')"
